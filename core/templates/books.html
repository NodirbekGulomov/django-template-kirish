{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <title>Books</title>
</head>
<body>
    <h1>Table of books</h1>
    <table border="1px">
        <tr>
            <td>ID</td>
            <td>Title</td>
            <td>Author</td>
            <td>Price</td>
            <td>Description</td>
        </tr>
        {% for book in books %}
            <tr>
                <td>{{book.id}}</td>
                <td>{{book.title}}</td>
                <td>{{book.author}}</td>
                <td>{{book.price}}</td>
                <td>{{book.description}}</td>
            </tr>
        {% endfor %}
    </table>
</body>
</html>
